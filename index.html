<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAKA LUXE SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #050507; color: white; font-family: sans-serif; padding: 20px; }
        .model-card { background: #1a1a20; padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; }
        .flavors { display: none; margin-top: 10px; }
        .open .flavors { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .flavor-btn { background: #bc4efc; padding: 10px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

    <div class="model-card" onclick="this.classList.toggle('open')">
        <h3>MIRROR 10K (5500 ₸)</h3>
        <div class="flavors">
            <div class="flavor-btn" onclick="addToCart('MIRROR 10K', 5500, event)">🍇 ICE GRAPE</div>
            <div class="flavor-btn" onclick="addToCart('MIRROR 10K', 5500, event)">🥭 MANGO</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];

        function addToCart(name, price, event) {
            event.stopPropagation();
            cart.push({name, price});
            
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            
            tg.MainButton.setParams({
                text: `ЗАКАЗАТЬ: ${total} ₸`,
                color: "#bc4efc",
                is_visible: true
            });
            tg.MainButton.show();
        }

        tg.onEvent('mainButtonClicked', function() {
            if (cart.length > 0) {
                let items = cart.map(i => i.name).join(", ");
                let total = cart.reduce((sum, i) => sum + i.price, 0);
                tg.sendData(`ЗАКАЗ: ${items} | СУММА: ${total} ₸`);
            }
        });
    </script>
</body>
</html>
